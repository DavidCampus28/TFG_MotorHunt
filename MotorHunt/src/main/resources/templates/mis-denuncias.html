<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Denuncias - MotorHunt</title>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #252525;
            --text-main: #d0d0d0;
            --text-secondary: #999;
            --accent: #d32f2f;
            --border: #333;
        }
        html[data-theme="light"] {
            --bg-dark: #f5f5f5;
            --bg-secondary: #ffffff;
            --bg-tertiary: #e8e8e8;
            --text-main: #333;
            --text-secondary: #666;
            --border: #ddd;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
        }
        main { max-width: 1200px; margin: 0 auto; padding: 36px 24px 60px; }
        .page-header { display: flex; justify-content: space-between; gap: 20px; align-items: flex-end; margin-bottom: 24px; }
        h1 { color: var(--accent); font-size: 30px; margin-bottom: 8px; }
        .subtitle { color: var(--text-secondary); }
        .filters {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            display: grid;
            grid-template-columns: 1.3fr repeat(3, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        input, select {
            width: 100%;
            padding: 11px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-tertiary);
            color: var(--text-main);
            font: inherit;
        }
        .cards { display: grid; gap: 14px; }
        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-left: 4px solid var(--accent);
            border-radius: 8px;
            padding: 18px;
        }
        .card-top {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 12px;
            align-items: flex-start;
        }
        .title { font-size: 18px; font-weight: 800; }
        .meta { color: var(--text-secondary); font-size: 13px; line-height: 1.5; margin-top: 4px; }
        .badge {
            display: inline-flex;
            border-radius: 999px;
            padding: 5px 10px;
            font-size: 12px;
            font-weight: 800;
            border: 1px solid var(--border);
            background: var(--bg-tertiary);
        }
        .PENDIENTE { color: #ffb74d; }
        .REVISANDO { color: #64b5f6; }
        .RESUELTA { color: #66bb6a; }
        .RECHAZADA { color: #ef5350; }
        .empty {
            padding: 28px;
            text-align: center;
            color: var(--text-secondary);
            border: 1px dashed var(--border);
            border-radius: 8px;
            background: var(--bg-secondary);
        }
        a.btn {
            display: inline-block;
            color: white;
            background: var(--accent);
            text-decoration: none;
            padding: 10px 14px;
            border-radius: 6px;
            font-weight: 700;
        }
        @media (max-width: 800px) {
            .filters { grid-template-columns: 1fr; }
            .page-header, .card-top { flex-direction: column; }
        }
    </style>
</head>
<body>
<div th:replace="~{header :: header}"></div>
<main>
    <div class="page-header">
        <div>
            <h1>Mis denuncias</h1>
            <p class="subtitle">Consulta las denuncias que has enviado, las recibidas y las asociadas a tus anuncios.</p>
        </div>
        <a class="btn" href="/perfil">Volver al perfil</a>
    </div>

    <section class="filters">
        <input id="filterText" type="search" placeholder="Buscar por descripcion, coche o usuario">
        <select id="filterEstado">
            <option value="">Todos los estados</option>
            <option value="PENDIENTE">Pendiente</option>
            <option value="REVISANDO">Revisando</option>
            <option value="RESUELTA">Resuelta</option>
            <option value="RECHAZADA">Rechazada</option>
        </select>
        <select id="filterRelacion">
            <option value="">Todas</option>
            <option value="ENVIADA">Enviadas por mi</option>
            <option value="RECIBIDA">Sobre mi cuenta</option>
            <option value="ANUNCIO_PROPIO">Sobre mis anuncios</option>
        </select>
        <select id="filterTipo">
            <option value="">Todos los tipos</option>
            <option value="FRAUDE">Fraude</option>
            <option value="SPAM">Spam</option>
            <option value="COCHE_INEXISTENTE">Coche inexistente</option>
            <option value="PRECIO_FALSO">Precio falso</option>
            <option value="COMPORTAMIENTO_SOSPECHOSO">Comportamiento sospechoso</option>
            <option value="CONTENIDO_INAPROPIADO">Contenido inapropiado</option>
            <option value="ABUSO">Abuso</option>
            <option value="OTRO">Otro</option>
        </select>
    </section>

    <section id="denunciasList" class="cards"></section>
</main>
<div th:replace="~{footer :: footer}"></div>

<script>
    let denuncias = [];

    function usuarioActual() {
        const raw = localStorage.getItem('usuario');
        return raw ? JSON.parse(raw) : null;
    }

    function normalizar(valor) {
        return String(valor || '').toLowerCase();
    }

    function fecha(valor) {
        return valor ? new Date(valor).toLocaleString('es-ES') : '-';
    }

    function cargarDenuncias() {
        const usuario = usuarioActual();
        if (!usuario) {
            window.location.href = '/login';
            return;
        }

        fetch(`/api/denuncias/usuario/${usuario.id}/todas`)
            .then(res => {
                if (!res.ok) throw new Error('No se pudieron cargar las denuncias');
                return res.json();
            })
            .then(data => {
                denuncias = Array.isArray(data) ? data : [];
                aplicarFiltros();
            })
            .catch(err => {
                document.getElementById('denunciasList').innerHTML = `<div class="empty">${err.message}</div>`;
            });
    }

    function aplicarFiltros() {
        const texto = normalizar(document.getElementById('filterText').value);
        const estado = document.getElementById('filterEstado').value;
        const relacion = document.getElementById('filterRelacion').value;
        const tipo = document.getElementById('filterTipo').value;

        const filtradas = denuncias.filter(d => {
            const contenido = [d.descripcion, d.coche, d.usuarioDenunciado, d.denunciante].map(normalizar).join(' ');
            if (texto && !contenido.includes(texto)) return false;
            if (estado && d.estado !== estado) return false;
            if (relacion && d.relacion !== relacion) return false;
            if (tipo && d.tipo !== tipo) return false;
            return true;
        });

        pintarDenuncias(filtradas);
    }

    function pintarDenuncias(items) {
        const contenedor = document.getElementById('denunciasList');
        if (items.length === 0) {
            contenedor.innerHTML = '<div class="empty">No hay denuncias con esos filtros.</div>';
            return;
        }

        contenedor.innerHTML = items.map(d => `
            <article class="card">
                <div class="card-top">
                    <div>
                        <div class="title">#${d.id} · ${d.tipo}</div>
                        <div class="meta">${d.relacion.replace('_', ' ')} · Creada: ${fecha(d.fechaCreacion)}</div>
                    </div>
                    <span class="badge ${d.estado}">${d.estado}</span>
                </div>
                <p>${d.descripcion || 'Sin descripcion'}</p>
                <div class="meta">
                    Denunciante: ${d.denunciante || '-'} · Usuario denunciado: ${d.usuarioDenunciado || '-'} · Coche: ${d.coche || '-'}
                </div>
                ${d.resolucion ? `<div class="meta">Resolucion: ${d.resolucion} · ${fecha(d.fechaResolucion)}</div>` : ''}
            </article>
        `).join('');
    }

    ['filterText', 'filterEstado', 'filterRelacion', 'filterTipo'].forEach(id => {
        document.getElementById(id).addEventListener('input', aplicarFiltros);
    });

    window.addEventListener('load', cargarDenuncias);
</script>
</body>
</html>
