<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotorHunt</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #151515 100%);
            color: #d0d0d0;
        }

        #app {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        main {
            flex: 1;
        }

        .hero {
            background: linear-gradient(135deg, #1a1a1a 0%, #252525 100%);
            color: white;
            padding: 80px 50px;
            text-align: center;
            border-bottom: 3px solid #d32f2f;
        }

        .hero h1 {
            font-size: 48px;
            color: #d32f2f;
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .hero p {
            font-size: 18px;
            color: #b0b0b0;
            font-weight: 300;
        }

        .container {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 50px;
        }

        .section-title {
            font-size: 32px;
            color: #d32f2f;
            border-bottom: 3px solid #d32f2f;
            padding-bottom: 15px;
            margin-bottom: 40px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .coches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 40px;
            margin-bottom: 60px;
        }

        .coche-card {
            background: linear-gradient(135deg, #1a1a1a 0%, #252525 100%);
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #333;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        .coche-card:hover {
            border-color: #d32f2f;
            box-shadow: 0 15px 40px rgba(211, 47, 47, 0.3);
            transform: translateY(-5px);
        }

        .coche-image {
            width: 100%;
            height: 220px;
            background: linear-gradient(135deg, #0d0d0d 0%, #1a1a1a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
        }

        .coche-info {
            padding: 28px;
        }

        .coche-marca {
            font-size: 20px;
            font-weight: 700;
            color: #d32f2f;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .coche-modelo {
            font-size: 15px;
            color: #888;
            margin-bottom: 15px;
            font-weight: 300;
        }

        .coche-detalles {
            font-size: 13px;
            color: #777;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }

        .coche-precio {
            font-size: 26px;
            font-weight: 700;
            color: #d32f2f;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .coche-vendedor {
            font-size: 13px;
            color: #888;
            margin-bottom: 15px;
            font-weight: 300;
        }

        .btn-ver {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #d32f2f 0%, #b71c1c 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 15px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .btn-ver:hover {
            background: linear-gradient(135deg, #b71c1c 0%, #8b0000 100%);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(211, 47, 47, 0.4);
        }

        .no-coches {
            text-align: center;
            padding: 60px 40px;
            background: linear-gradient(135deg, #1a1a1a 0%, #252525 100%);
            border: 2px solid #333;
            border-radius: 12px;
            color: #888;
            font-size: 16px;
        }

        @media (max-width: 768px) {
            .hero {
                padding: 50px 30px;
            }

            .hero h1 {
                font-size: 32px;
            }

            .container {
                padding: 0 20px;
                margin: 40px auto;
            }

            .coches-grid {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .section-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div th:replace="header :: header"></div>

        <main>
            <div class="hero">
                <h1>🚗 Bienvenido a MotorHunt</h1>
                <p>Compra y venta de vehículos de confianza</p>
            </div>

            <div class="container">
                <h2 class="section-title">🚗 Coches Disponibles</h2>
                
                <div th:if="${coches.isEmpty()}" class="no-coches">
                    <p>No hay coches disponibles en este momento.</p>
                </div>
                
                <div class="coches-grid" th:if="${!coches.isEmpty()}">
                    <div th:each="coche : ${coches}" class="coche-card">
                        <div class="coche-image">🚙</div>
                        <div class="coche-info">
                            <div class="coche-marca" th:text="${coche.marca}"></div>
                            <div class="coche-modelo" th:text="${coche.modelo + ' (' + coche.ano + ')'}"></div>
                            <div class="coche-detalles">
                                <span th:text="${coche.kilometros} + ' km'"></span>
                                <span th:text="${coche.combustible}"></span>
                            </div>
                            <div class="coche-precio" th:text="'€' + ${coche.precio}"></div>
                            <div class="coche-vendedor" th:text="'Vendedor: ' + ${coche.usuario.nombre}"></div>
                            <button class="btn-ver">Ver Detalles</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <div th:replace="footer :: footer"></div>
    </div>
</body>
</html>
