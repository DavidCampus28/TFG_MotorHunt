<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - MotorHunt</title>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #252525;
            --text-main: #d0d0d0;
            --text-secondary: #999;
            --accent: #d32f2f;
            --accent-dark: #b71c1c;
            --border: #333;
        }

        html[data-theme="light"] {
            --bg-dark: #f5f5f5;
            --bg-secondary: #ffffff;
            --bg-tertiary: #e8e8e8;
            --text-main: #333333;
            --text-secondary: #666666;
            --accent: #d32f2f;
            --accent-dark: #b71c1c;
            --border: #ddd;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-secondary) 100%);
            color: var(--text-main);
            transition: background 0.3s, color 0.3s;
        }

        #app {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        main {
            flex: 1;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 50px;
        }

        .perfil-header {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
            padding: 40px;
            border-radius: 12px;
            border: 2px solid var(--border);
            margin-bottom: 40px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        .perfil-info {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 40px;
            align-items: start;
        }

        .perfil-avatar {
            width: 140px;
            height: 140px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            box-shadow: 0 8px 25px rgba(211, 47, 47, 0.3);
        }

        .perfil-datos {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .dato-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #333;
        }

        .dato-item:last-child {
            border-bottom: none;
        }

        .dato-label {
            color: var(--accent);
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .dato-valor {
            color: var(--text-main);
            font-size: 16px;
        }

        .btn-editar {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .btn-editar:hover {
            background: linear-gradient(135deg, var(--accent-dark) 0%, #8b0000 100%);
            transform: translateY(-2px);
        }

        .seccion {
            margin-bottom: 60px;
        }

        .seccion-titulo {
            font-size: 28px;
            color: var(--accent);
            border-bottom: 3px solid var(--accent);
            padding-bottom: 15px;
            margin-bottom: 30px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .btn-anadir {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s;
            margin-bottom: 30px;
        }

        .btn-anadir:hover {
            background: linear-gradient(135deg, var(--accent-dark) 0%, #8b0000 100%);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(211, 47, 47, 0.4);
        }

        .coches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .coche-card {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--border);
            transition: all 0.3s;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        .coche-card:hover {
            border-color: var(--accent);
            box-shadow: 0 15px 40px rgba(211, 47, 47, 0.3);
            transform: translateY(-5px);
        }

        .coche-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-secondary) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
        }

        .coche-info {
            padding: 20px;
        }

        .coche-marca {
            font-size: 18px;
            font-weight: 700;
            color: #d32f2f;
            margin-bottom: 5px;
        }

        .coche-precio {
            font-size: 20px;
            font-weight: 700;
            color: #d32f2f;
            margin: 15px 0;
        }

        .btn-acciones {
            display: flex;
            gap: 10px;
        }

        .btn-accion {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .btn-editar-coche {
            background: #d32f2f;
            color: white;
        }

        .btn-editar-coche:hover {
            background: #b71c1c;
        }

        .btn-eliminar {
            background: #666;
            color: white;
        }

        .btn-eliminar:hover {
            background: #444;
        }

        .vacio {
            text-align: center;
            padding: 40px;
            background: linear-gradient(135deg, #1a1a1a 0%, #252525 100%);
            border-radius: 12px;
            color: #888;
            border: 2px solid #333;
        }

        .chats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .chat-card {
            background: linear-gradient(135deg, #1a1a1a 0%, #252525 100%);
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #333;
            transition: all 0.3s;
        }

        .chat-card:hover {
            border-color: #d32f2f;
            box-shadow: 0 8px 25px rgba(211, 47, 47, 0.3);
        }

        .chat-usuario {
            font-weight: 600;
            color: #d32f2f;
            margin-bottom: 10px;
        }

        .chat-preview {
            font-size: 13px;
            color: #999;
            margin-bottom: 10px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            border: 2px solid var(--border);
        }

        .modal-header {
            font-size: 24px;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            color: var(--text-main);
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-tertiary);
            color: var(--text-main);
            font-family: inherit;
        }

        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 5px rgba(211, 47, 47, 0.3);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-guardar {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            color: white;
        }

        .btn-guardar:hover {
            background: linear-gradient(135deg, var(--accent-dark) 0%, #8b0000 100%);
        }

        .btn-cancelar {
            background: var(--bg-tertiary);
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        .btn-cancelar:hover {
            background: var(--border);
        }

        @media (max-width: 768px) {
            .container {
                padding: 0 20px;
            }

            .perfil-info {
                grid-template-columns: 1fr;
            }

            .coches-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div th:replace="header :: header"></div>

        <main>
            <div class="container">
                <!-- PERFIL USUARIO -->
                <div class="perfil-header">
                    <div class="perfil-info">
                        <div class="perfil-avatar">👤</div>
                        <div class="perfil-datos">
                            <div class="dato-item">
                                <span class="dato-label">Nombre</span>
                                <span class="dato-valor" id="nombrePerfil">-</span>
                            </div>
                            <div class="dato-item">
                                <span class="dato-label">Email</span>
                                <span class="dato-valor" id="emailPerfil">-</span>
                            </div>
                            <div class="dato-item">
                                <span class="dato-label">Teléfono</span>
                                <span class="dato-valor" id="telefonoPerfil">-</span>
                            </div>
                            <div class="dato-item">
                                <span class="dato-label">Dirección</span>
                                <span class="dato-valor" id="direccionPerfil">-</span>
                            </div>
                            <div class="dato-item">
                                <span class="dato-label">Rol</span>
                                <span class="dato-valor" id="rolPerfil">-</span>
                            </div>
                            <button class="btn-editar">Editar Perfil</button>
                        </div>
                    </div>
                </div>

                <!-- MIS COCHES A LA VENTA -->
                <div class="seccion">
                    <h2 class="seccion-titulo">🚗 Mis Coches en Venta</h2>
                    <button class="btn-anadir">+ Añadir Coche Nuevo</button>
                    
                    <div id="misCoches">
                        <div class="vacio">No tienes coches a la venta.</div>
                    </div>
                </div>

                <!-- COCHES FAVORITOS -->
                <div class="seccion">
                    <h2 class="seccion-titulo">♡ Mis Coches Favoritos</h2>
                    
                    <div id="cochesFavoritos">
                        <div class="vacio">No tienes coches marcados como favoritos.</div>
                    </div>
                </div>

                <!-- CHATS -->
                <div class="seccion">
                    <h2 class="seccion-titulo">💭 Mis Chats</h2>
                    
                    <div id="chats" class="chats-grid">
                        <div class="vacio" style="grid-column: 1/-1;">No tienes chats activos.</div>
                    </div>
                </div>
            </div>
        </main>

        <!-- MODAL EDITAR PERFIL -->
        <div id="editarPerfilModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">Editar Perfil</div>
                <form id="editarPerfilForm">
                    <div class="form-group">
                        <label>Nombre</label>
                        <input type="text" id="editNombre" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="editEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Teléfono</label>
                        <input type="text" id="editTelefono">
                    </div>
                    <div class="form-group">
                        <label>Dirección</label>
                        <input type="text" id="editDireccion">
                    </div>
                    <div class="modal-buttons">
                        <button type="submit" class="btn-guardar">Guardar Cambios</button>
                        <button type="button" class="btn-cancelar" onclick="cerrarModalPerfil()">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- MODAL AÑADIR COCHE -->
        <div id="anadirCocheModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">Añadir Coche Nuevo</div>
                <form id="anadirCocheForm">
                    <div class="form-group">
                        <label>Marca *</label>
                        <input type="text" id="newCocheMarca" required>
                    </div>
                    <div class="form-group">
                        <label>Modelo *</label>
                        <input type="text" id="newCocheModelo" required>
                    </div>
                    <div class="form-group">
                        <label>Año *</label>
                        <input type="number" id="newCocheAnio" required>
                    </div>
                    <div class="form-group">
                        <label>Motor</label>
                        <input type="text" id="newCocheMotor">
                    </div>
                    <div class="form-group">
                        <label>Color</label>
                        <input type="text" id="newCocheColor">
                    </div>
                    <div class="form-group">
                        <label>Tipo Cambio *</label>
                        <select id="newCocheTipoCambio" required>
                            <option value="">Selecciona...</option>
                            <option value="MANUAL">Manual</option>
                            <option value="AUTOMATICO">Automático</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Combustible *</label>
                        <select id="newCocheCombustible" required>
                            <option value="">Selecciona...</option>
                            <option value="GASOLINA">Gasolina</option>
                            <option value="DIESEL">Diésel</option>
                            <option value="ELECTRICO">Eléctrico</option>
                            <option value="HIBRIDO">Híbrido</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Etiqueta Ambiental *</label>
                        <select id="newCocheEtiqueta" required>
                            <option value="">Selecciona...</option>
                            <option value="CERO">Cero</option>
                            <option value="ECO">Eco</option>
                            <option value="C">C</option>
                            <option value="B">B</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Kilometraje *</label>
                        <input type="number" id="newCocheKm" required>
                    </div>
                    <div class="form-group">
                        <label>Precio € *</label>
                        <input type="number" id="newCochePrecio" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>Número de Puertas</label>
                        <input type="number" id="newCocheNumeroPuertas">
                    </div>
                    <div class="form-group">
                        <label>Número de Plazas</label>
                        <input type="number" id="newCocheNumeroPlazas">
                    </div>
                    <div class="form-group">
                        <label>Caballos Potencia</label>
                        <input type="number" id="newCocheCaballos">
                    </div>
                    <div class="form-group">
                        <label>CC</label>
                        <input type="number" id="newCocheCc">
                    </div>
                    <div class="form-group">
                        <label>Ubicación</label>
                        <input type="text" id="newCocheUbicacion">
                    </div>
                    <div class="form-group">
                        <label>Descripción</label>
                        <textarea id="newCocheDescripcion" style="min-height: 80px;"></textarea>
                    </div>
                    <div class="modal-buttons">
                        <button type="submit" class="btn-guardar">Crear Coche</button>
                        <button type="button" class="btn-cancelar" onclick="cerrarModalAnadirCoche()">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>

        <div th:replace="footer :: footer"></div>
    </div>

    <script>
        function cargarPerfil() {
            const usuario = localStorage.getItem('usuario');
            
            if (!usuario) {
                window.location.href = '/login';
                return;
            }

            const user = JSON.parse(usuario);
            
            document.getElementById('nombrePerfil').textContent = user.nombre || '-';
            document.getElementById('emailPerfil').textContent = user.email || '-';
            document.getElementById('telefonoPerfil').textContent = user.telefono || '-';
            document.getElementById('direccionPerfil').textContent = user.direccion || '-';
            document.getElementById('rolPerfil').textContent = user.rol || '-';

            // Aquí van llamadas API para cargar coches, favoritos, chats
            cargarMisCoches(user.id);
            cargarFavoritos(user.id);
            cargarChats(user.id);
        }

        function cargarMisCoches(userId) {
            fetch(`/coches/usuario/${userId}`)
                .then(res => res.json())
                .then(coches => {
                    if (coches.length === 0) {
                        document.getElementById('misCoches').innerHTML = '<div class="vacio">No tienes coches a la venta.</div>';
                        return;
                    }
                    let html = '<div class="coches-grid">';
                    coches.forEach(coche => {
                        html += `
                            <div class="coche-card">
                                <div class="coche-image">🚙</div>
                                <div class="coche-info">
                                    <div class="coche-marca">${coche.marca} ${coche.modelo}</div>
                                    <div>${coche.ano} • ${coche.kilometros} km</div>
                                    <div class="coche-precio">€${coche.precio.toFixed(0)}</div>
                                    <div class="btn-acciones">
                                        <button class="btn-accion btn-editar-coche">Editar</button>
                                        <button class="btn-accion btn-eliminar">Eliminar</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    html += '</div>';
                    document.getElementById('misCoches').innerHTML = html;
                })
                .catch(err => {
                    document.getElementById('misCoches').innerHTML = '<div class="vacio">Error cargando coches.</div>';
                });
        }

        function cargarFavoritos(userId) {
            // Placeholder
        }

        function cargarChats(userId) {
            // Placeholder
        }

        function abrirModalPerfil() {
            const usuario = JSON.parse(localStorage.getItem('usuario'));
            document.getElementById('editNombre').value = usuario.nombre || '';
            document.getElementById('editEmail').value = usuario.email || '';
            document.getElementById('editTelefono').value = usuario.telefono || '';
            document.getElementById('editDireccion').value = usuario.direccion || '';
            document.getElementById('editarPerfilModal').classList.add('active');
        }

        function cerrarModalPerfil() {
            document.getElementById('editarPerfilModal').classList.remove('active');
        }

        document.getElementById('editarPerfilForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const usuario = JSON.parse(localStorage.getItem('usuario'));
            const data = {
                nombre: document.getElementById('editNombre').value,
                email: document.getElementById('editEmail').value,
                telefono: document.getElementById('editTelefono').value,
                direccion: document.getElementById('editDireccion').value
            };

            fetch(`/api/admin/usuarios/${usuario.id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(r => {
                if (!r.ok) return r.json().then(e => Promise.reject(new Error(e.error || e.tipo || 'Error')));
                return r.json();
            })
            .then(() => {
                usuario.nombre = data.nombre;
                usuario.email = data.email;
                usuario.telefono = data.telefono;
                usuario.direccion = data.direccion;
                localStorage.setItem('usuario', JSON.stringify(usuario));
                cerrarModalPerfil();
                cargarPerfil();
            })
            .catch(e => alert('Error: ' + e.message));
        });

        document.querySelector('.btn-editar').addEventListener('click', abrirModalPerfil);

        function abrirModalAnadirCoche() {
            document.getElementById('anadirCocheModal').classList.add('active');
        }

        function cerrarModalAnadirCoche() {
            document.getElementById('anadirCocheModal').classList.remove('active');
            document.getElementById('anadirCocheForm').reset();
        }

        document.querySelector('.btn-anadir').addEventListener('click', abrirModalAnadirCoche);

        document.getElementById('anadirCocheForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const usuario = JSON.parse(localStorage.getItem('usuario'));
            const data = {
                marca: document.getElementById('newCocheMarca').value,
                modelo: document.getElementById('newCocheModelo').value,
                ano: parseInt(document.getElementById('newCocheAnio').value),
                motor: document.getElementById('newCocheMotor').value,
                color: document.getElementById('newCocheColor').value,
                tipoCambio: document.getElementById('newCocheTipoCambio').value,
                combustible: document.getElementById('newCocheCombustible').value,
                etiquetaAmbiental: document.getElementById('newCocheEtiqueta').value,
                km: parseInt(document.getElementById('newCocheKm').value),
                precio: parseFloat(document.getElementById('newCochePrecio').value),
                numeroPuertas: parseInt(document.getElementById('newCocheNumeroPuertas').value) || null,
                numeroPlazas: parseInt(document.getElementById('newCocheNumeroPlazas').value) || null,
                caballosPotencia: parseInt(document.getElementById('newCocheCaballos').value) || null,
                centimetrosCubicos: parseInt(document.getElementById('newCocheCc').value) || null,
                ubicacion: document.getElementById('newCocheUbicacion').value,
                descripcion: document.getElementById('newCocheDescripcion').value,
                usuarioId: usuario.id,
                estado: 'EN_VENTA'
            };

            fetch('/coches/crear', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(r => {
                if (!r.ok) return r.json().then(e => Promise.reject(new Error(e.error || e.tipo || 'Error')));
                return r.json();
            })
            .then(() => {
                cerrarModalAnadirCoche();
                cargarPerfil();
            })
            .catch(e => alert('Error: ' + e.message));
        });

        window.addEventListener('load', cargarPerfil);
    </script>
</body>
</html>
