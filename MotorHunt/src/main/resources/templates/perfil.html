<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - MotorHunt</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #151515 100%);
            color: #d0d0d0;
        }

        #app {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        main {
            flex: 1;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 50px;
        }

        .perfil-header {
            background: linear-gradient(135deg, #1a1a1a 0%, #252525 100%);
            padding: 40px;
            border-radius: 12px;
            border: 2px solid #333;
            margin-bottom: 40px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        .perfil-info {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 40px;
            align-items: start;
        }

        .perfil-avatar {
            width: 140px;
            height: 140px;
            background: linear-gradient(135deg, #d32f2f 0%, #b71c1c 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            box-shadow: 0 8px 25px rgba(211, 47, 47, 0.3);
        }

        .perfil-datos {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .dato-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #333;
        }

        .dato-item:last-child {
            border-bottom: none;
        }

        .dato-label {
            color: #d32f2f;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .dato-valor {
            color: #d0d0d0;
            font-size: 16px;
        }

        .btn-editar {
            background: linear-gradient(135deg, #d32f2f 0%, #b71c1c 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .btn-editar:hover {
            background: linear-gradient(135deg, #b71c1c 0%, #8b0000 100%);
            transform: translateY(-2px);
        }

        .seccion {
            margin-bottom: 60px;
        }

        .seccion-titulo {
            font-size: 28px;
            color: #d32f2f;
            border-bottom: 3px solid #d32f2f;
            padding-bottom: 15px;
            margin-bottom: 30px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .btn-anadir {
            background: linear-gradient(135deg, #d32f2f 0%, #b71c1c 100%);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s;
            margin-bottom: 30px;
        }

        .btn-anadir:hover {
            background: linear-gradient(135deg, #b71c1c 0%, #8b0000 100%);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(211, 47, 47, 0.4);
        }

        .coches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .coche-card {
            background: linear-gradient(135deg, #1a1a1a 0%, #252525 100%);
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #333;
            transition: all 0.3s;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        .coche-card:hover {
            border-color: #d32f2f;
            box-shadow: 0 15px 40px rgba(211, 47, 47, 0.3);
            transform: translateY(-5px);
        }

        .coche-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #0d0d0d 0%, #1a1a1a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
        }

        .coche-info {
            padding: 20px;
        }

        .coche-marca {
            font-size: 18px;
            font-weight: 700;
            color: #d32f2f;
            margin-bottom: 5px;
        }

        .coche-precio {
            font-size: 20px;
            font-weight: 700;
            color: #d32f2f;
            margin: 15px 0;
        }

        .btn-acciones {
            display: flex;
            gap: 10px;
        }

        .btn-accion {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .btn-editar-coche {
            background: #d32f2f;
            color: white;
        }

        .btn-editar-coche:hover {
            background: #b71c1c;
        }

        .btn-eliminar {
            background: #666;
            color: white;
        }

        .btn-eliminar:hover {
            background: #444;
        }

        .vacio {
            text-align: center;
            padding: 40px;
            background: linear-gradient(135deg, #1a1a1a 0%, #252525 100%);
            border-radius: 12px;
            color: #888;
            border: 2px solid #333;
        }

        .chats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .chat-card {
            background: linear-gradient(135deg, #1a1a1a 0%, #252525 100%);
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #333;
            transition: all 0.3s;
        }

        .chat-card:hover {
            border-color: #d32f2f;
            box-shadow: 0 8px 25px rgba(211, 47, 47, 0.3);
        }

        .chat-usuario {
            font-weight: 600;
            color: #d32f2f;
            margin-bottom: 10px;
        }

        .chat-preview {
            font-size: 13px;
            color: #999;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 0 20px;
            }

            .perfil-info {
                grid-template-columns: 1fr;
            }

            .coches-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div th:replace="header :: header"></div>

        <main>
            <div class="container">
                <!-- PERFIL USUARIO -->
                <div class="perfil-header">
                    <div class="perfil-info">
                        <div class="perfil-avatar">👤</div>
                        <div class="perfil-datos">
                            <div class="dato-item">
                                <span class="dato-label">Nombre</span>
                                <span class="dato-valor" id="nombrePerfil">-</span>
                            </div>
                            <div class="dato-item">
                                <span class="dato-label">Email</span>
                                <span class="dato-valor" id="emailPerfil">-</span>
                            </div>
                            <div class="dato-item">
                                <span class="dato-label">Teléfono</span>
                                <span class="dato-valor" id="telefonoPerfil">-</span>
                            </div>
                            <div class="dato-item">
                                <span class="dato-label">Dirección</span>
                                <span class="dato-valor" id="direccionPerfil">-</span>
                            </div>
                            <div class="dato-item">
                                <span class="dato-label">Rol</span>
                                <span class="dato-valor" id="rolPerfil">-</span>
                            </div>
                            <button class="btn-editar">Editar Perfil</button>
                        </div>
                    </div>
                </div>

                <!-- MIS COCHES A LA VENTA -->
                <div class="seccion">
                    <h2 class="seccion-titulo">🚗 Mis Coches en Venta</h2>
                    <button class="btn-anadir">+ Añadir Coche Nuevo</button>
                    
                    <div id="misCoches">
                        <div class="vacio">No tienes coches a la venta.</div>
                    </div>
                </div>

                <!-- COCHES FAVORITOS -->
                <div class="seccion">
                    <h2 class="seccion-titulo">❤️ Mis Coches Favoritos</h2>
                    
                    <div id="cochesFavoritos">
                        <div class="vacio">No tienes coches marcados como favoritos.</div>
                    </div>
                </div>

                <!-- CHATS -->
                <div class="seccion">
                    <h2 class="seccion-titulo">💬 Mis Chats</h2>
                    
                    <div id="chats" class="chats-grid">
                        <div class="vacio" style="grid-column: 1/-1;">No tienes chats activos.</div>
                    </div>
                </div>
            </div>
        </main>

        <div th:replace="footer :: footer"></div>
    </div>

    <script>
        function cargarPerfil() {
            const usuario = localStorage.getItem('usuario');
            
            if (!usuario) {
                window.location.href = '/login';
                return;
            }

            const user = JSON.parse(usuario);
            
            document.getElementById('nombrePerfil').textContent = user.nombre || '-';
            document.getElementById('emailPerfil').textContent = user.email || '-';
            document.getElementById('telefonoPerfil').textContent = user.telefono || '-';
            document.getElementById('direccionPerfil').textContent = user.direccion || '-';
            document.getElementById('rolPerfil').textContent = user.rol || '-';

            // Aquí van llamadas API para cargar coches, favoritos, chats
            cargarMisCoches(user.id);
            cargarFavoritos(user.id);
            cargarChats(user.id);
        }

        function cargarMisCoches(userId) {
            fetch(`/coches/usuario/${userId}`)
                .then(res => res.json())
                .then(coches => {
                    if (coches.length === 0) {
                        document.getElementById('misCoches').innerHTML = '<div class="vacio">No tienes coches a la venta.</div>';
                        return;
                    }
                    let html = '<div class="coches-grid">';
                    coches.forEach(coche => {
                        html += `
                            <div class="coche-card">
                                <div class="coche-image">🚙</div>
                                <div class="coche-info">
                                    <div class="coche-marca">${coche.marca} ${coche.modelo}</div>
                                    <div>${coche.ano} • ${coche.kilometros} km</div>
                                    <div class="coche-precio">€${coche.precio.toFixed(0)}</div>
                                    <div class="btn-acciones">
                                        <button class="btn-accion btn-editar-coche">Editar</button>
                                        <button class="btn-accion btn-eliminar">Eliminar</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    html += '</div>';
                    document.getElementById('misCoches').innerHTML = html;
                })
                .catch(err => {
                    document.getElementById('misCoches').innerHTML = '<div class="vacio">Error cargando coches.</div>';
                });
        }

        function cargarFavoritos(userId) {
            // Placeholder
        }

        function cargarChats(userId) {
            // Placeholder
        }

        window.addEventListener('load', cargarPerfil);
    </script>
</body>
</html>
