<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Coches - MotorHunt</title>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-secondary: #171717;
            --bg-tertiary: #242424;
            --text-main: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent: #d32f2f;
            --accent-dark: #a91f1f;
            --border: #343434;
            --ok: #2e7d32;
            --warn: #ef8f00;
        }

        html[data-theme="light"] {
            --bg-dark: #f4f4f4;
            --bg-secondary: #ffffff;
            --bg-tertiary: #ededed;
            --text-main: #222222;
            --text-secondary: #666666;
            --border: #dddddd;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
        }

        main {
            max-width: 1280px;
            margin: 0 auto;
            padding: 34px 28px 60px;
        }

        .page-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 20px;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 30px;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 15px;
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 14px;
            margin-bottom: 22px;
        }

        .metric {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
        }

        .metric span {
            display: block;
            color: var(--text-secondary);
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .metric strong {
            font-size: 25px;
        }

        .filters {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            display: grid;
            grid-template-columns: 1.5fr repeat(5, minmax(120px, 1fr));
            gap: 12px;
            margin-bottom: 22px;
        }

        input, select, textarea {
            width: 100%;
            background: var(--bg-tertiary);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 11px 12px;
            font: inherit;
        }

        textarea {
            min-height: 96px;
            resize: vertical;
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(320px, 430px) 1fr;
            gap: 20px;
            align-items: start;
        }

        .cars-list {
            display: grid;
            gap: 12px;
        }

        .car-card {
            display: grid;
            grid-template-columns: 104px 1fr;
            gap: 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: border-color 0.2s, transform 0.2s;
        }

        .car-card:hover, .car-card.active {
            border-color: var(--accent);
            transform: translateY(-1px);
        }

        .car-card img {
            width: 104px;
            height: 82px;
            object-fit: cover;
            border-radius: 6px;
            background: var(--bg-tertiary);
        }

        .placeholder {
            width: 104px;
            height: 82px;
            border-radius: 6px;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 12px;
        }

        .car-title {
            font-size: 17px;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .car-meta {
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.5;
        }

        .badges {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .badge {
            border-radius: 999px;
            padding: 4px 8px;
            font-size: 12px;
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .estado-en_venta { color: #4caf50; }
        .estado-reservado { color: var(--warn); }
        .estado-vendido { color: #4aa3ff; }
        .estado-fuera_servicio { color: var(--accent); }

        .panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            min-height: 420px;
            overflow: hidden;
        }

        .panel-empty {
            padding: 40px;
            color: var(--text-secondary);
            text-align: center;
        }

        .detail-cover {
            width: 100%;
            height: 260px;
            object-fit: cover;
            background: var(--bg-tertiary);
            display: block;
        }

        .detail-body {
            padding: 20px;
        }

        .detail-top {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
        }

        .price {
            color: var(--accent);
            font-size: 26px;
            font-weight: 900;
            white-space: nowrap;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 16px 0;
        }

        button, .btn-link {
            border: none;
            border-radius: 6px;
            padding: 10px 14px;
            cursor: pointer;
            background: var(--accent);
            color: #ffffff;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        button.secondary, .btn-link.secondary {
            background: var(--bg-tertiary);
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
            margin: 16px 0;
        }

        .info-item {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px;
        }

        .info-item span {
            display: block;
            color: var(--text-secondary);
            font-size: 12px;
            margin-bottom: 4px;
        }

        .section-title {
            margin: 22px 0 10px;
            font-size: 18px;
            color: var(--accent);
        }

        .people-list {
            display: grid;
            gap: 9px;
        }

        .person {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 11px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
        }

        .person strong {
            display: block;
            margin-bottom: 4px;
        }

        .person small {
            display: block;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .empty {
            color: var(--text-secondary);
            padding: 14px;
            border: 1px dashed var(--border);
            border-radius: 6px;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.72);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            padding: 18px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            width: min(980px, 100%);
            max-height: 92vh;
            overflow: auto;
            background: var(--bg-secondary);
            border: 1px solid var(--accent);
            border-radius: 8px;
            padding: 22px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 13px;
        }

        .form-group.full {
            grid-column: 1 / -1;
        }

        label {
            display: block;
            color: var(--text-secondary);
            font-size: 13px;
            margin-bottom: 6px;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 18px;
        }

        @media (max-width: 980px) {
            .summary, .filters, .layout, .info-grid, .form-grid {
                grid-template-columns: 1fr;
            }

            .page-head, .detail-top {
                align-items: flex-start;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<div th:replace="~{header :: header}"></div>

<main>
    <div class="page-head">
        <div>
            <h1>Mis coches</h1>
            <p class="subtitle">Gestiona tus anuncios, revisa likes, contactos y cambia cualquier dato del coche.</p>
        </div>
        <a class="btn-link secondary" href="/perfil">Volver al perfil</a>
    </div>

    <section class="summary">
        <div class="metric"><span>Anuncios</span><strong id="metricTotal">0</strong></div>
        <div class="metric"><span>En venta</span><strong id="metricVenta">0</strong></div>
        <div class="metric"><span>Likes</span><strong id="metricLikes">0</strong></div>
        <div class="metric"><span>Contactos</span><strong id="metricContactos">0</strong></div>
    </section>

    <section class="filters">
        <input id="filterText" type="search" placeholder="Buscar por marca, modelo, motor o ubicacion">
        <select id="filterEstado">
            <option value="">Todos los estados</option>
            <option value="EN_VENTA">En venta</option>
            <option value="RESERVADO">Reservado</option>
            <option value="VENDIDO">Vendido</option>
            <option value="FUERA_SERVICIO">Fuera de servicio</option>
        </select>
        <select id="filterCombustible">
            <option value="">Combustible</option>
            <option value="GASOLINA">Gasolina</option>
            <option value="DIESEL">Diesel</option>
            <option value="ELECTRICO">Electrico</option>
            <option value="HIBRIDO">Hibrido</option>
        </select>
        <select id="filterCambio">
            <option value="">Cambio</option>
            <option value="MANUAL">Manual</option>
            <option value="AUTOMATICO">Automatico</option>
        </select>
        <select id="filterActividad">
            <option value="">Actividad</option>
            <option value="likes">Con likes</option>
            <option value="contactos">Con contactos</option>
            <option value="sin-actividad">Sin actividad</option>
        </select>
        <select id="filterOrden">
            <option value="recientes">Mas recientes</option>
            <option value="precio-desc">Precio mayor</option>
            <option value="precio-asc">Precio menor</option>
            <option value="likes-desc">Mas likes</option>
            <option value="contactos-desc">Mas contactos</option>
        </select>
    </section>

    <section class="layout">
        <div class="cars-list" id="carsList"></div>
        <div class="panel" id="detailPanel">
            <div class="panel-empty">Selecciona un coche para ver toda la informacion.</div>
        </div>
    </section>
</main>

<div class="modal" id="editModal">
    <div class="modal-content">
        <h2 id="modalTitle">Editar coche</h2>
        <form id="editForm">
            <div class="form-grid">
                <div class="form-group"><label>Marca</label><input id="editMarca" required></div>
                <div class="form-group"><label>Modelo</label><input id="editModelo" required></div>
                <div class="form-group"><label>Motor</label><input id="editMotor" required></div>
                <div class="form-group"><label>Color</label><input id="editColor"></div>
                <div class="form-group"><label>Estado</label><select id="editEstado"><option value="EN_VENTA">En venta</option><option value="RESERVADO">Reservado</option><option value="VENDIDO">Vendido</option><option value="FUERA_SERVICIO">Fuera de servicio</option></select></div>
                <div class="form-group"><label>Ubicacion</label><input id="editUbicacion" required></div>
                <div class="form-group"><label>Combustible</label><select id="editCombustible"><option value="GASOLINA">Gasolina</option><option value="DIESEL">Diesel</option><option value="ELECTRICO">Electrico</option><option value="HIBRIDO">Hibrido</option></select></div>
                <div class="form-group"><label>Cambio</label><select id="editTipoCambio"><option value="MANUAL">Manual</option><option value="AUTOMATICO">Automatico</option></select></div>
                <div class="form-group"><label>Etiqueta</label><select id="editEtiqueta"><option value="B">B</option><option value="C">C</option><option value="ECO">ECO</option><option value="CERO">CERO</option></select></div>
                <div class="form-group"><label>Ano</label><input id="editAno" type="number" required></div>
                <div class="form-group"><label>Kilometros</label><input id="editKm" type="number" required></div>
                <div class="form-group"><label>Precio</label><input id="editPrecio" type="number" step="0.01" required></div>
                <div class="form-group"><label>Puertas</label><input id="editPuertas" type="number" required></div>
                <div class="form-group"><label>Plazas</label><input id="editPlazas" type="number" required></div>
                <div class="form-group"><label>Centimetros cubicos</label><input id="editCc" type="number" required></div>
                <div class="form-group"><label>Caballos</label><input id="editCaballos" type="number" required></div>
                <div class="form-group full"><label>Descripcion</label><textarea id="editDescripcion"></textarea></div>
            </div>
            <div class="modal-actions">
                <button type="button" class="secondary" onclick="cerrarModal()">Cancelar</button>
                <button type="submit">Guardar cambios</button>
            </div>
        </form>
    </div>
</div>

<div th:replace="~{footer :: footer}"></div>

<script>
    let coches = [];
    let cochesFiltrados = [];
    let cocheSeleccionadoId = null;

    const estadoTexto = {
        EN_VENTA: 'En venta',
        RESERVADO: 'Reservado',
        VENDIDO: 'Vendido',
        FUERA_SERVICIO: 'Fuera de servicio'
    };

    function usuarioActual() {
        const raw = localStorage.getItem('usuario');
        return raw ? JSON.parse(raw) : null;
    }

    function euros(valor) {
        return Number(valor || 0).toLocaleString('es-ES', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 });
    }

    function fecha(valor) {
        return valor ? new Date(valor).toLocaleString('es-ES') : '-';
    }

    function normalizar(valor) {
        return String(valor || '').toLowerCase();
    }

    function cargarMisCoches() {
        const usuario = usuarioActual();
        if (!usuario) {
            window.location.href = '/login';
            return;
        }

        fetch(`/api/perfil/${usuario.id}/mis-coches`)
            .then(res => {
                if (!res.ok) throw new Error('No se pudieron cargar tus coches');
                return res.json();
            })
            .then(data => {
                coches = Array.isArray(data) ? data : [];
                cocheSeleccionadoId = coches[0] ? coches[0].id : null;
                aplicarFiltros();
            })
            .catch(err => {
                document.getElementById('carsList').innerHTML = `<div class="empty">${err.message}</div>`;
            });
    }

    function aplicarFiltros() {
        const texto = normalizar(document.getElementById('filterText').value);
        const estado = document.getElementById('filterEstado').value;
        const combustible = document.getElementById('filterCombustible').value;
        const cambio = document.getElementById('filterCambio').value;
        const actividad = document.getElementById('filterActividad').value;
        const orden = document.getElementById('filterOrden').value;

        cochesFiltrados = coches.filter(coche => {
            const contenido = [coche.marca, coche.modelo, coche.motor, coche.ubicacion, coche.color, coche.descripcion].map(normalizar).join(' ');
            const totalLikes = Number(coche.totalMeGustas || 0);
            const totalContactos = (coche.contactos || []).length;

            if (texto && !contenido.includes(texto)) return false;
            if (estado && coche.estado !== estado) return false;
            if (combustible && coche.combustible !== combustible) return false;
            if (cambio && coche.tipoCambio !== cambio) return false;
            if (actividad === 'likes' && totalLikes === 0) return false;
            if (actividad === 'contactos' && totalContactos === 0) return false;
            if (actividad === 'sin-actividad' && (totalLikes > 0 || totalContactos > 0)) return false;
            return true;
        });

        cochesFiltrados.sort((a, b) => {
            if (orden === 'precio-desc') return Number(b.precio) - Number(a.precio);
            if (orden === 'precio-asc') return Number(a.precio) - Number(b.precio);
            if (orden === 'likes-desc') return Number(b.totalMeGustas || 0) - Number(a.totalMeGustas || 0);
            if (orden === 'contactos-desc') return (b.contactos || []).length - (a.contactos || []).length;
            return new Date(b.fechaCreacion || 0) - new Date(a.fechaCreacion || 0);
        });

        if (!cochesFiltrados.some(c => c.id === cocheSeleccionadoId)) {
            cocheSeleccionadoId = cochesFiltrados[0] ? cochesFiltrados[0].id : null;
        }

        pintarMetricas();
        pintarLista();
        pintarDetalle();
    }

    function pintarMetricas() {
        document.getElementById('metricTotal').textContent = coches.length;
        document.getElementById('metricVenta').textContent = coches.filter(c => c.estado === 'EN_VENTA').length;
        document.getElementById('metricLikes').textContent = coches.reduce((total, c) => total + Number(c.totalMeGustas || 0), 0);
        document.getElementById('metricContactos').textContent = coches.reduce((total, c) => total + (c.contactos || []).length, 0);
    }

    function pintarLista() {
        const contenedor = document.getElementById('carsList');
        if (cochesFiltrados.length === 0) {
            contenedor.innerHTML = '<div class="empty">No hay coches que coincidan con los filtros.</div>';
            return;
        }

        contenedor.innerHTML = cochesFiltrados.map(coche => `
            <article class="car-card ${coche.id === cocheSeleccionadoId ? 'active' : ''}" onclick="seleccionarCoche(${coche.id})">
                ${coche.portadaUrl ? `<img src="${coche.portadaUrl}" alt="${coche.marca} ${coche.modelo}">` : '<div class="placeholder">Sin foto</div>'}
                <div>
                    <div class="car-title">${coche.marca} ${coche.modelo}</div>
                    <div class="car-meta">${coche.ano} · ${Number(coche.kilometros || 0).toLocaleString('es-ES')} km · ${euros(coche.precio)}</div>
                    <div class="badges">
                        <span class="badge estado-${normalizar(coche.estado)}">${estadoTexto[coche.estado] || coche.estado}</span>
                        <span class="badge">${coche.totalMeGustas || 0} likes</span>
                        <span class="badge">${(coche.contactos || []).length} contactos</span>
                    </div>
                </div>
            </article>
        `).join('');
    }

    function seleccionarCoche(id) {
        cocheSeleccionadoId = id;
        pintarLista();
        pintarDetalle();
    }

    function pintarDetalle() {
        const panel = document.getElementById('detailPanel');
        const coche = coches.find(c => c.id === cocheSeleccionadoId);
        if (!coche) {
            panel.innerHTML = '<div class="panel-empty">Selecciona un coche para ver toda la informacion.</div>';
            return;
        }

        const likes = coche.likes || [];
        const contactos = coche.contactos || [];
        panel.innerHTML = `
            ${coche.portadaUrl ? `<img class="detail-cover" src="${coche.portadaUrl}" alt="${coche.marca} ${coche.modelo}">` : ''}
            <div class="detail-body">
                <div class="detail-top">
                    <div>
                        <h2>${coche.marca} ${coche.modelo}</h2>
                        <p class="subtitle">${coche.motor} · ${coche.ubicacion}</p>
                    </div>
                    <div class="price">${euros(coche.precio)}</div>
                </div>

                <div class="actions">
                    <button onclick="abrirEditar(${coche.id})">Editar coche</button>
                    <a class="btn-link secondary" href="/coche-detalle?id=${coche.id}">Ver anuncio</a>
                    <a class="btn-link secondary" href="/perfil">Perfil</a>
                </div>

                <div class="info-grid">
                    <div class="info-item"><span>Estado</span><strong>${estadoTexto[coche.estado] || coche.estado}</strong></div>
                    <div class="info-item"><span>Ano</span><strong>${coche.ano}</strong></div>
                    <div class="info-item"><span>Kilometros</span><strong>${Number(coche.kilometros || 0).toLocaleString('es-ES')}</strong></div>
                    <div class="info-item"><span>Combustible</span><strong>${coche.combustible}</strong></div>
                    <div class="info-item"><span>Cambio</span><strong>${coche.tipoCambio}</strong></div>
                    <div class="info-item"><span>Etiqueta</span><strong>${coche.etiquetaAmbiental}</strong></div>
                    <div class="info-item"><span>Puertas</span><strong>${coche.numeroPuertas}</strong></div>
                    <div class="info-item"><span>Plazas</span><strong>${coche.numeroPlazas}</strong></div>
                    <div class="info-item"><span>CC</span><strong>${coche.centimetrosCubicos}</strong></div>
                    <div class="info-item"><span>Caballos</span><strong>${coche.caballosPotencia}</strong></div>
                    <div class="info-item"><span>Color</span><strong>${coche.color || '-'}</strong></div>
                    <div class="info-item"><span>Creado</span><strong>${fecha(coche.fechaCreacion)}</strong></div>
                </div>

                <h3 class="section-title">Descripcion</h3>
                <p class="subtitle">${coche.descripcion || 'Sin descripcion.'}</p>

                <h3 class="section-title">Usuarios que dieron like (${likes.length})</h3>
                <div class="people-list">
                    ${likes.length ? likes.map(like => `
                        <div class="person">
                            <div>
                                <strong>${like.nombre}</strong>
                                <small>${like.email}${like.telefono ? ' · ' + like.telefono : ''}</small>
                                <small>Like: ${fecha(like.fecha)}</small>
                            </div>
                            <a class="btn-link secondary" href="/chat?contacto=${like.usuarioId}">Chat</a>
                        </div>
                    `).join('') : '<div class="empty">Todavia nadie ha dado like a este anuncio.</div>'}
                </div>

                <h3 class="section-title">Contactos por este coche (${contactos.length})</h3>
                <div class="people-list">
                    ${contactos.length ? contactos.map(contacto => `
                        <div class="person">
                            <div>
                                <strong>${contacto.nombre}</strong>
                                <small>${contacto.email}${contacto.telefono ? ' · ' + contacto.telefono : ''}</small>
                                <small>${contacto.totalMensajes} mensajes · ${contacto.mensajesNoLeidos} no leidos</small>
                                <small>Ultimo: ${contacto.ultimoMensaje || '-'} (${fecha(contacto.ultimoMensajeFecha)})</small>
                            </div>
                            <a class="btn-link secondary" href="/chat?contacto=${contacto.usuarioId}">Abrir chat</a>
                        </div>
                    `).join('') : '<div class="empty">No hay contactos asociados a este coche.</div>'}
                </div>
            </div>
        `;
    }

    function abrirEditar(id) {
        const coche = coches.find(c => c.id === id);
        if (!coche) return;

        cocheSeleccionadoId = id;
        document.getElementById('modalTitle').textContent = `Editar ${coche.marca} ${coche.modelo}`;
        document.getElementById('editMarca').value = coche.marca || '';
        document.getElementById('editModelo').value = coche.modelo || '';
        document.getElementById('editMotor').value = coche.motor || '';
        document.getElementById('editColor').value = coche.color || '';
        document.getElementById('editEstado').value = coche.estado || 'EN_VENTA';
        document.getElementById('editUbicacion').value = coche.ubicacion || '';
        document.getElementById('editCombustible').value = coche.combustible || 'GASOLINA';
        document.getElementById('editTipoCambio').value = coche.tipoCambio || 'MANUAL';
        document.getElementById('editEtiqueta').value = coche.etiquetaAmbiental || 'C';
        document.getElementById('editAno').value = coche.ano || '';
        document.getElementById('editKm').value = coche.kilometros || '';
        document.getElementById('editPrecio').value = coche.precio || '';
        document.getElementById('editPuertas').value = coche.numeroPuertas || '';
        document.getElementById('editPlazas').value = coche.numeroPlazas || '';
        document.getElementById('editCc').value = coche.centimetrosCubicos || '';
        document.getElementById('editCaballos').value = coche.caballosPotencia || '';
        document.getElementById('editDescripcion').value = coche.descripcion || '';
        document.getElementById('editModal').classList.add('active');
    }

    function cerrarModal() {
        document.getElementById('editModal').classList.remove('active');
    }

    document.getElementById('editForm').addEventListener('submit', function(event) {
        event.preventDefault();
        const id = cocheSeleccionadoId;
        const data = {
            marca: document.getElementById('editMarca').value,
            modelo: document.getElementById('editModelo').value,
            motor: document.getElementById('editMotor').value,
            color: document.getElementById('editColor').value,
            estado: document.getElementById('editEstado').value,
            ubicacion: document.getElementById('editUbicacion').value,
            combustible: document.getElementById('editCombustible').value,
            tipoCambio: document.getElementById('editTipoCambio').value,
            etiquetaAmbiental: document.getElementById('editEtiqueta').value,
            ano: Number(document.getElementById('editAno').value),
            km: Number(document.getElementById('editKm').value),
            precio: Number(document.getElementById('editPrecio').value),
            numeroPuertas: Number(document.getElementById('editPuertas').value),
            numeroPlazas: Number(document.getElementById('editPlazas').value),
            centimetrosCubicos: Number(document.getElementById('editCc').value),
            caballosPotencia: Number(document.getElementById('editCaballos').value),
            descripcion: document.getElementById('editDescripcion').value
        };

        fetch(`/coches/${id}/editar`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
            .then(res => {
                if (!res.ok) throw new Error('No se pudo guardar el coche');
                return res.json();
            })
            .then(() => {
                cerrarModal();
                cargarMisCoches();
            })
            .catch(err => alert(err.message));
    });

    ['filterText', 'filterEstado', 'filterCombustible', 'filterCambio', 'filterActividad', 'filterOrden']
        .forEach(id => document.getElementById(id).addEventListener('input', aplicarFiltros));

    window.addEventListener('load', cargarMisCoches);
</script>
</body>
</html>
