<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotorHunt</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0a0a;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #252525;
            --text-main: #d0d0d0;
            --text-secondary: #b0b0b0;
            --text-tertiary: #888;
            --accent: #d32f2f;
            --accent-dark: #b71c1c;
            --border-color: #333;
        }

        html[data-theme="light"] {
            --bg-dark: #ffffff;
            --bg-secondary: #f5f5f5;
            --bg-tertiary: #e8e8e8;
            --text-main: #333333;
            --text-secondary: #555555;
            --text-tertiary: #777777;
            --accent: #d32f2f;
            --accent-dark: #b71c1c;
            --border-color: #ddd;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-secondary) 100%);
            color: var(--text-main);
        }

        #app {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        main {
            flex: 1;
        }

        .hero {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
            color: white;
            padding: 80px 50px;
            text-align: center;
            border-bottom: 3px solid var(--accent);
        }

        .hero h1 {
            font-size: 48px;
            color: var(--accent);
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .hero p {
            font-size: 18px;
            color: var(--text-secondary);
            font-weight: 300;
        }

        .container {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 50px;
        }

        .section-title {
            font-size: 32px;
            color: var(--accent);
            border-bottom: 3px solid var(--accent);
            padding-bottom: 15px;
            margin-bottom: 40px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .coches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 40px;
            margin-bottom: 60px;
        }

        .coche-card {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--border-color);
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        .coche-card:hover {
            border-color: var(--accent);
            box-shadow: 0 15px 40px rgba(211, 47, 47, 0.3);
            transform: translateY(-5px);
        }

        .coche-image {
            width: 100%;
            height: 220px;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-secondary) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            background-size: cover;
            background-position: center;
        }

        .coche-info {
            padding: 28px;
        }

        .coche-marca {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .coche-modelo {
            font-size: 15px;
            color: var(--text-tertiary);
            margin-bottom: 15px;
            font-weight: 300;
        }

        .coche-detalles {
            font-size: 13px;
            color: var(--text-tertiary);
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .coche-precio {
            font-size: 26px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .coche-vendedor {
            font-size: 13px;
            color: var(--text-tertiary);
            margin-bottom: 15px;
            font-weight: 300;
        }

        .estado-badge {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 14px;
        }

        .estado-en-venta { background: rgba(39,174,96,0.15); color: #27ae60; border: 1px solid #27ae60; }
        .estado-reservado { background: rgba(241,196,15,0.15); color: #f1c40f; border: 1px solid #f1c40f; }
        .estado-vendido { background: rgba(231,76,60,0.15); color: #e74c3c; border: 1px solid #e74c3c; }

        .btn-ver {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 15px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .btn-ver:hover {
            background: linear-gradient(135deg, var(--accent-dark) 0%, #8b0000 100%);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(211, 47, 47, 0.4);
        }

        /* NUEVO SISTEMA DE FILTROS PROFESIONAL */
        .filtros-container {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
            border-radius: 12px;
            padding: 30px;
            border: 2px solid var(--border-color);
            margin-bottom: 40px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        .filtros-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .filtro-grupo {
            display: flex;
            flex-direction: column;
        }

        .filtro-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .select-wrapper {
            position: relative;
        }

        .select-trigger {
            width: 100%;
            padding: 12px 15px;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-secondary) 100%);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .select-trigger:hover {
            border-color: var(--accent);
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
        }

        .select-trigger.active {
            border-color: var(--accent);
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
            box-shadow: 0 0 12px rgba(211, 47, 47, 0.3);
        }

        .select-arrow {
            font-size: 12px;
            pointer-events: none;
        }

        .select-dropdown {
            position: absolute;
            top: calc(100% + 5px);
            left: 0;
            right: 0;
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
            border: 2px solid var(--accent);
            border-radius: 8px;
            max-height: 280px;
            overflow: hidden;
            z-index: 1000;
            display: none;
            flex-direction: column;
            box-shadow: 0 12px 30px rgba(0,0,0,0.5);
        }

        .select-dropdown.active {
            display: flex;
        }

        .select-search {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .select-search input {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-main);
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .select-search input::placeholder {
            color: var(--text-tertiary);
        }

        .select-search input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 8px rgba(211, 47, 47, 0.2);
        }

        .select-options {
            overflow-y: auto;
            flex: 1;
        }

        .select-option {
            padding: 12px 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 13px;
            color: var(--text-main);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
        }

        .select-option:hover {
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-secondary) 100%);
            padding-left: 20px;
        }

        .select-option.selected {
            background: var(--accent);
            color: white;
            font-weight: 600;
        }

        .select-option:last-child {
            border-bottom: none;
        }

        .range-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .range-input {
            flex: 1;
            padding: 10px 12px;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-secondary) 100%);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .range-input:hover {
            border-color: var(--accent);
        }

        .range-input:focus {
            outline: none;
            border-color: var(--accent);
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
        }

        .range-separator {
            color: var(--text-tertiary);
            font-weight: 600;
            font-size: 14px;
        }

        .no-coches {
            text-align: center;
            padding: 60px 40px;
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-tertiary);
            font-size: 16px;
        }

        .filtros-acciones {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-filtrar, .btn-limpiar {
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 13px;
            letter-spacing: 0.6px;
            text-transform: uppercase;
        }

        .btn-filtrar {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            color: white;
        }

        .btn-filtrar:hover {
            background: linear-gradient(135deg, var(--accent-dark) 0%, #8b0000 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(211, 47, 47, 0.4);
        }

        .btn-limpiar {
            background: linear-gradient(135deg, #666 0%, #444 100%);
            color: white;
        }

        .btn-limpiar:hover {
            background: linear-gradient(135deg, #777 0%, #555 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .resultados-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 15px 20px;
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
            border-radius: 8px;
            border-left: 4px solid var(--accent);
        }

        .resultados-texto {
            font-size: 16px;
            font-weight: 600;
        }

        .resultados-total {
            color: var(--accent);
            font-size: 20px;
            font-weight: 700;
        }

        @media (max-width: 768px) {
            .hero {
                padding: 50px 30px;
            }

            .hero h1 {
                font-size: 32px;
            }

            .container {
                padding: 0 20px;
                margin: 40px auto;
            }

            .coches-grid {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .section-title {
                font-size: 24px;
            }

            .filtros-container {
                padding: 20px;
            }

            .filtros-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 15px;
            }

            .filtro-label {
                font-size: 11px;
            }

            .select-trigger {
                padding: 10px 12px;
                font-size: 13px;
            }

            .filtros-acciones {
                gap: 10px;
            }

            .btn-filtrar, .btn-limpiar {
                padding: 10px 20px;
                font-size: 12px;
                flex: 1;
                min-width: 120px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div th:replace="header :: header"></div>

        <main>
            <div class="hero">
                <h1>🚗 Bienvenido a MotorHunt</h1>
                <p>Compra y venta de vehículos de confianza</p>
            </div>

            <div class="container">
                <h2 class="section-title">🔍 Buscar y Filtrar</h2>

                <!-- NUEVO SISTEMA DE FILTROS -->
                <div class="filtros-container">
                    <div class="filtros-grid">
                        <!-- Marca -->
                        <div class="filtro-grupo">
                            <label class="filtro-label">Marca</label>
                            <div class="select-wrapper" id="marcaWrapper">
                                <div class="select-trigger" onclick="toggleSelect(event, 'marca')">
                                    <span id="marcaSelected">Todas</span>
                                    <span class="select-arrow">▼</span>
                                </div>
                                <div class="select-dropdown" id="marcaDropdown">
                                    <div class="select-search">
                                        <input type="text" placeholder="Buscar marca..." onkeyup="filtrarOpciones(event, 'marca')">
                                    </div>
                                    <div class="select-options" id="marcaOptions"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Modelo -->
                        <div class="filtro-grupo">
                            <label class="filtro-label">Modelo</label>
                            <div class="select-wrapper" id="modeloWrapper">
                                <div class="select-trigger" onclick="toggleSelect(event, 'modelo')">
                                    <span id="modeloSelected">Todos</span>
                                    <span class="select-arrow">▼</span>
                                </div>
                                <div class="select-dropdown" id="modeloDropdown">
                                    <div class="select-search">
                                        <input type="text" placeholder="Buscar modelo..." onkeyup="filtrarOpciones(event, 'modelo')">
                                    </div>
                                    <div class="select-options" id="modeloOptions"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Combustible -->
                        <div class="filtro-grupo">
                            <label class="filtro-label">Combustible</label>
                            <div class="select-wrapper" id="combustibleWrapper">
                                <div class="select-trigger" onclick="toggleSelect(event, 'combustible')">
                                    <span id="combustibleSelected">Todos</span>
                                    <span class="select-arrow">▼</span>
                                </div>
                                <div class="select-dropdown" id="combustibleDropdown">
                                    <div class="select-options" id="combustibleOptions"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Tipo de Cambio -->
                        <div class="filtro-grupo">
                            <label class="filtro-label">Cambio</label>
                            <div class="select-wrapper" id="cambioWrapper">
                                <div class="select-trigger" onclick="toggleSelect(event, 'cambio')">
                                    <span id="cambioSelected">Todos</span>
                                    <span class="select-arrow">▼</span>
                                </div>
                                <div class="select-dropdown" id="cambioDropdown">
                                    <div class="select-options" id="cambioOptions"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Año -->
                        <div class="filtro-grupo">
                            <label class="filtro-label">Año</label>
                            <div class="range-group">
                                <input type="number" id="anoMin" class="range-input" placeholder="De" min="2000" max="2026">
                                <span class="range-separator">-</span>
                                <input type="number" id="anoMax" class="range-input" placeholder="A" min="2000" max="2026">
                            </div>
                        </div>

                        <!-- Km -->
                        <div class="filtro-grupo">
                            <label class="filtro-label">Kilómetros</label>
                            <div class="range-group">
                                <input type="number" id="kmMin" class="range-input" placeholder="De" min="0">
                                <span class="range-separator">-</span>
                                <input type="number" id="kmMax" class="range-input" placeholder="A" min="0">
                            </div>
                        </div>

                        <!-- Precio -->
                        <div class="filtro-grupo">
                            <label class="filtro-label">Precio (€)</label>
                            <div class="range-group">
                                <input type="number" id="precioMin" class="range-input" placeholder="De" min="0">
                                <span class="range-separator">-</span>
                                <input type="number" id="precioMax" class="range-input" placeholder="A" min="0">
                            </div>
                        </div>

                        <!-- Caballos -->
                        <div class="filtro-grupo">
                            <label class="filtro-label">Caballos (CV)</label>
                            <div class="range-group">
                                <input type="number" id="caballosMin" class="range-input" placeholder="De" min="0">
                                <span class="range-separator">-</span>
                                <input type="number" id="caballosMax" class="range-input" placeholder="A" min="0">
                            </div>
                        </div>
                    </div>

                    <div class="filtros-acciones">
                        <button class="btn-filtrar" onclick="aplicarFiltros()">🔍 Filtrar</button>
                        <button class="btn-limpiar" onclick="limpiarFiltros()">✕ Limpiar</button>
                    </div>
                </div>

                <!-- Resultados -->
                <div class="resultados-info">
                    <span class="resultados-texto">Coches encontrados:</span>
                    <span class="resultados-total"><span id="totalCoches">0</span></span>
                </div>

                <div th:if="${coches.isEmpty()}" class="no-coches">
                    <p>No hay coches disponibles en este momento.</p>
                </div>

                <div class="coches-grid" id="cochesGrid" th:if="${!coches.isEmpty()}">
                    <div th:each="coche : ${coches}" class="coche-card"
                         th:attr="data-marca=${coche.marca},
                                  data-modelo=${coche.modelo},
                                  data-combustible=${coche.combustible},
                                  data-cambio=${coche.tipoCambio},
                                  data-ano=${coche.ano},
                                  data-km=${coche.kilometros},
                                  data-precio=${coche.precio},
                                  data-caballos=${coche.caballosPotencia}">
                        <div class="coche-image"
                             th:style="${portadas[coche.id] != null ? 'background-image: url(' + portadas[coche.id] + ')' : ''}">
                            <span th:if="${portadas[coche.id] == null}">🚙</span>
                        </div>
                        <div class="coche-info">
                            <div class="coche-marca" th:text="${coche.marca}"></div>
                            <div class="coche-modelo" th:text="${coche.modelo + ' (' + coche.ano + ')'}"></div>
                            <div class="estado-badge" th:classappend="${coche.estado.name() == 'VENDIDO' ? ' estado-vendido' : (coche.estado.name() == 'RESERVADO' ? ' estado-reservado' : ' estado-en-venta')}">
                                <span th:text="${coche.estado.name() == 'VENDIDO' ? 'Vendido' : (coche.estado.name() == 'RESERVADO' ? 'Reservado' : 'En venta')}"></span>
                            </div>
                            <div class="coche-detalles">
                                <span th:text="${coche.kilometros} + ' km'"></span>
                                <span th:text="${coche.combustible}"></span>
                            </div>
                            <div class="coche-precio" th:text="'€' + ${coche.precio}"></div>
                            <div class="coche-vendedor" th:text="'Vendedor: ' + ${coche.usuario.nombre}"></div>
                            <button class="btn-ver" th:onclick="'window.location.href=\'/coche-detalle?id=' + ${coche.id} + '\''" style="cursor: pointer;">Ver Detalles</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <div th:replace="footer :: footer"></div>
    </div>

    <script>
        let filtrosActivos = {
            marca: null,
            modelo: null,
            combustible: null,
            cambio: null,
            anoMin: null,
            anoMax: null,
            kmMin: null,
            kmMax: null,
            precioMin: null,
            precioMax: null,
            caballosMin: null,
            caballosMax: null
        };

        document.addEventListener('DOMContentLoaded', function() {
            inicializarFiltros();
            llenarOpciones();
        });

        function inicializarFiltros() {
            const marcas = new Set();
            const modelos = new Set();
            const combustibles = new Set();
            const cambios = new Set();
            let anoMin = 9999, anoMax = 0, kmMax = 0, precioMax = 0, caballosMax = 0;

            document.querySelectorAll('.coche-card').forEach(card => {
                const marca = card.getAttribute('data-marca');
                const modelo = card.getAttribute('data-modelo');
                const combustible = card.getAttribute('data-combustible');
                const cambio = card.getAttribute('data-cambio');
                const ano = parseInt(card.getAttribute('data-ano'));
                const km = parseInt(card.getAttribute('data-km'));
                const precio = parseInt(card.getAttribute('data-precio'));
                const caballos = parseInt(card.getAttribute('data-caballos'));

                if (marca) marcas.add(marca);
                if (modelo) modelos.add(modelo);
                if (combustible) combustibles.add(combustible);
                if (cambio) cambios.add(cambio);

                if (ano < anoMin) anoMin = ano;
                if (ano > anoMax) anoMax = ano;
                if (km > kmMax) kmMax = km;
                if (precio > precioMax) precioMax = precio;
                if (caballos > caballosMax) caballosMax = caballos;
            });

            // Actualizar máximos
            document.getElementById('anoMin').max = anoMax;
            document.getElementById('anoMax').max = anoMax;
            document.getElementById('kmMax').max = kmMax;
            document.getElementById('precioMax').max = precioMax;
            document.getElementById('caballosMax').max = caballosMax;

            // Llenar opciones
            llenarSelect('marca', ['Todas', ...Array.from(marcas).sort()]);
            llenarSelect('combustible', ['Todos', ...Array.from(combustibles).sort()]);
            llenarSelect('cambio', ['Todos', ...Array.from(cambios).sort()]);
            llenarSelect('modelo', ['Todos', ...Array.from(modelos).sort()]);
        }

        function llenarOpciones() {
            actualizarTotal();
        }

        function llenarSelect(tipo, opciones) {
            const container = document.getElementById(tipo + 'Options');
            container.innerHTML = '';

            opciones.forEach(opcion => {
                const div = document.createElement('div');
                div.className = 'select-option';
                div.textContent = opcion;
                div.onclick = function() {
                    seleccionarOpcion(tipo, opcion);
                };
                container.appendChild(div);
            });
        }

        function toggleSelect(event, tipo) {
            event.stopPropagation();
            const dropdown = document.getElementById(tipo + 'Dropdown');
            const openDropdown = document.querySelector('.select-dropdown.active:not(#' + tipo + 'Dropdown)');

            if (openDropdown) {
                openDropdown.classList.remove('active');
                document.getElementById(openDropdown.id.replace('Dropdown', 'Wrapper')).querySelector('.select-trigger').classList.remove('active');
            }

            dropdown.classList.toggle('active');
            event.target.closest('.select-trigger').classList.toggle('active');
        }

        function filtrarOpciones(event, tipo) {
            const searchText = event.target.value.toLowerCase();
            const options = document.querySelectorAll('#' + tipo + 'Dropdown .select-option');

            options.forEach(option => {
                const text = option.textContent.toLowerCase();
                option.style.display = text.includes(searchText) ? 'flex' : 'none';
            });
        }

        function seleccionarOpcion(tipo, opcion) {
            const selected = document.getElementById(tipo + 'Selected');
            const dropdown = document.getElementById(tipo + 'Dropdown');
            const trigger = dropdown.parentElement.querySelector('.select-trigger');

            selected.textContent = opcion;
            filtrosActivos[tipo] = (opcion === 'Todas' || opcion === 'Todos') ? null : opcion;

            document.querySelectorAll('#' + tipo + 'Dropdown .select-option').forEach(opt => {
                opt.classList.toggle('selected', opt.textContent === opcion);
            });

            dropdown.classList.remove('active');
            trigger.classList.remove('active');

            if (tipo === 'marca') {
                actualizarModelos();
            }

            actualizarTotal();
        }

        function actualizarModelos() {
            const marcaSeleccionada = filtrosActivos.marca;
            const modelos = new Set();

            document.querySelectorAll('.coche-card').forEach(card => {
                if (!marcaSeleccionada || card.getAttribute('data-marca') === marcaSeleccionada) {
                    const modelo = card.getAttribute('data-modelo');
                    if (modelo) modelos.add(modelo);
                }
            });

            llenarSelect('modelo', ['Todos', ...Array.from(modelos).sort()]);
            document.getElementById('modeloSelected').textContent = 'Todos';
            filtrosActivos.modelo = null;
        }

        function aplicarFiltros() {
            filtrosActivos.anoMin = document.getElementById('anoMin').value || null;
            filtrosActivos.anoMax = document.getElementById('anoMax').value || null;
            filtrosActivos.kmMin = document.getElementById('kmMin').value || null;
            filtrosActivos.kmMax = document.getElementById('kmMax').value || null;
            filtrosActivos.precioMin = document.getElementById('precioMin').value || null;
            filtrosActivos.precioMax = document.getElementById('precioMax').value || null;
            filtrosActivos.caballosMin = document.getElementById('caballosMin').value || null;
            filtrosActivos.caballosMax = document.getElementById('caballosMax').value || null;

            filtrar();
        }

        function filtrar() {
            const cards = document.querySelectorAll('.coche-card');
            let visibles = 0;
            let noCoches = document.querySelector('.no-coches');

            cards.forEach(card => {
                let mostrar = true;

                const marca = card.getAttribute('data-marca');
                const modelo = card.getAttribute('data-modelo');
                const combustible = card.getAttribute('data-combustible');
                const cambio = card.getAttribute('data-cambio');
                const ano = parseInt(card.getAttribute('data-ano'));
                const km = parseInt(card.getAttribute('data-km'));
                const precio = parseInt(card.getAttribute('data-precio'));
                const caballos = parseInt(card.getAttribute('data-caballos'));

                if (filtrosActivos.marca && marca !== filtrosActivos.marca) mostrar = false;
                if (filtrosActivos.modelo && modelo !== filtrosActivos.modelo) mostrar = false;
                if (filtrosActivos.combustible && combustible !== filtrosActivos.combustible) mostrar = false;
                if (filtrosActivos.cambio && cambio !== filtrosActivos.cambio) mostrar = false;

                if (filtrosActivos.anoMin && ano < parseInt(filtrosActivos.anoMin)) mostrar = false;
                if (filtrosActivos.anoMax && ano > parseInt(filtrosActivos.anoMax)) mostrar = false;
                if (filtrosActivos.kmMin && km < parseInt(filtrosActivos.kmMin)) mostrar = false;
                if (filtrosActivos.kmMax && km > parseInt(filtrosActivos.kmMax)) mostrar = false;
                if (filtrosActivos.precioMin && precio < parseInt(filtrosActivos.precioMin)) mostrar = false;
                if (filtrosActivos.precioMax && precio > parseInt(filtrosActivos.precioMax)) mostrar = false;
                if (filtrosActivos.caballosMin && caballos < parseInt(filtrosActivos.caballosMin)) mostrar = false;
                if (filtrosActivos.caballosMax && caballos > parseInt(filtrosActivos.caballosMax)) mostrar = false;

                card.style.display = mostrar ? 'block' : 'none';
                if (mostrar) visibles++;
            });

            document.getElementById('totalCoches').textContent = visibles;

            if (visibles === 0) {
                if (!noCoches) {
                    noCoches = document.createElement('div');
                    noCoches.className = 'no-coches';
                    noCoches.innerHTML = '<p>No hay coches que coincidan con los filtros seleccionados.</p>';
                    const grid = document.getElementById('cochesGrid');
                    grid.parentNode.insertBefore(noCoches, grid);
                }
                document.getElementById('cochesGrid').style.display = 'none';
            } else {
                if (noCoches) noCoches.remove();
                document.getElementById('cochesGrid').style.display = 'grid';
            }
        }

        function actualizarTotal() {
            const cards = document.querySelectorAll('.coche-card');
            document.getElementById('totalCoches').textContent = cards.length;
        }

        function limpiarFiltros() {
            filtrosActivos = {
                marca: null,
                modelo: null,
                combustible: null,
                cambio: null,
                anoMin: null,
                anoMax: null,
                kmMin: null,
                kmMax: null,
                precioMin: null,
                precioMax: null,
                caballosMin: null,
                caballosMax: null
            };

            document.getElementById('marcaSelected').textContent = 'Todas';
            document.getElementById('modeloSelected').textContent = 'Todos';
            document.getElementById('combustibleSelected').textContent = 'Todos';
            document.getElementById('cambioSelected').textContent = 'Todos';
            document.getElementById('anoMin').value = '';
            document.getElementById('anoMax').value = '';
            document.getElementById('kmMin').value = '';
            document.getElementById('kmMax').value = '';
            document.getElementById('precioMin').value = '';
            document.getElementById('precioMax').value = '';
            document.getElementById('caballosMin').value = '';
            document.getElementById('caballosMax').value = '';

            document.querySelectorAll('.select-option').forEach(opt => opt.classList.remove('selected'));
            document.querySelectorAll('.select-option').forEach(opt => {
                if (opt.textContent === 'Todas' || opt.textContent === 'Todos') {
                    opt.classList.add('selected');
                }
            });

            filtrar();
        }

        document.addEventListener('click', function(event) {
            if (!event.target.closest('.select-wrapper')) {
                document.querySelectorAll('.select-dropdown').forEach(dd => dd.classList.remove('active'));
                document.querySelectorAll('.select-trigger').forEach(tr => tr.classList.remove('active'));
            }
        });
    </script>
</body>
</html>
